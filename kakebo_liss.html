<!DOCTYPE html>
<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Kakebo · Liss &amp; Anye</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
:root {
  --liss:        #7C5CBF;
  --liss-deep:   #5B3F9A;
  --liss-bg:     #F0EBF8;
  --liss-text:   #3D2470;
  --anye:        #C0756A;
  --anye-bg:     #FAEEE9;
  --anye-text:   #8B3A30;
  --surface:     #FAF9FC;
  --surface2:    #F3F0F9;
  --card:        #FFFFFF;
  --border:      rgba(124,92,191,0.12);
  --border-soft: rgba(0,0,0,0.06);
  --text:        #1C1625;
  --text2:       #6B6478;
  --text3:       #A89DB8;
  --accent:      #7C5CBF;
  --accent-glow: rgba(124,92,191,0.18);
  --danger:      #C0392B;
  --success:     #2D7D62;
  --radius:      16px;
  --radius-sm:   10px;
  --max-w:       480px;
  --sidebar-w:   270px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--surface); font-family: 'DM Sans', sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }

.app { display: flex; flex-direction: column; height: 100vh; max-width: var(--max-w); margin: 0 auto; background: var(--surface); }

.header { background: var(--card); border-bottom: 1px solid var(--border); padding: 18px 20px 0; flex-shrink: 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.header-brand { display: flex; flex-direction: column; gap: 1px; }
.header-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--text3); }
.header-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; letter-spacing: -0.5px; color: var(--text); line-height: 1.1; }
.header-title em { font-style: normal; color: var(--accent); }
.mes-pill { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; color: var(--liss-text); background: var(--liss-bg); border: 1px solid rgba(124,92,191,0.2); border-radius: 20px; padding: 6px 12px; cursor: pointer; -webkit-appearance: none; appearance: none; outline: none; }
.tabs { display: flex; }
.tab { flex: 1; text-align: center; padding: 11px 0; font-size: 13px; font-weight: 500; color: var(--text3); border-bottom: 2px solid transparent; cursor: pointer; transition: all .2s; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.page { display: none; padding: 18px 16px; }
.page.active { display: block; }

.sidebar { display: none; }
.main-desktop { display: contents; }
.desktop-topbar { display: none; }
.dash-grid { display: block; }

@media (min-width: 768px) {
  body { background: #EDEBF4; }
  .app { flex-direction: row; max-width: 1120px; height: 100vh; margin: 0 auto; background: transparent; }
  .sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 32px 22px; flex-shrink: 0; }
  .header { display: none; }
  .sidebar-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--liss) 0%, #A07FD8 100%); display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700; color: #fff; letter-spacing: .02em; margin-bottom: 14px; flex-shrink: 0; }
  .sidebar-brand { margin-bottom: 6px; }
  .sidebar-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--text3); margin-bottom: 2px; }
  .sidebar-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .sidebar-title em { font-style: normal; color: var(--accent); }
  .sidebar-divider { height: 1px; background: var(--border); margin: 20px 0; }
  .sidebar-mes-lbl { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; display: block; margin-bottom: 8px; }
  .sidebar-mes-select { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--liss-text); background: var(--liss-bg); border: 1.5px solid rgba(124,92,191,0.2); border-radius: var(--radius-sm); padding: 10px 14px; cursor: pointer; outline: none; -webkit-appearance: none; appearance: none; transition: border-color .2s; margin-bottom: 24px; }
  .sidebar-mes-select:focus { border-color: var(--accent); }
  .sidebar-nav { display: flex; flex-direction: column; gap: 3px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all .15s; border: none; background: none; text-align: left; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--liss-bg); color: var(--liss-text); font-weight: 600; }
  .nav-icon { font-size: 15px; }
  .sidebar-footer { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border); }
  .sidebar-footer-name { font-family: 'Playfair Display', serif; font-size: 13px; color: var(--text3); text-align: center; }
  .main-desktop { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--surface); }
  .desktop-topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .desktop-topbar-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .desktop-topbar-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .content { flex: 1; overflow-y: auto; padding: 0; }
  .page { display: none; padding: 32px; }
  .page.active { display: block; }
  .metrics { grid-template-columns: repeat(4, 1fr); }
  .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  .dash-col { display: flex; flex-direction: column; gap: 14px; }
  .reg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .reg-grid .field-full { grid-column: 1 / -1; }
  .reg-card { max-width: 680px; }
}

.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.metric { background: var(--card); border-radius: var(--radius); padding: 16px; border: 1px solid var(--border-soft); position: relative; overflow: hidden; }
.metric::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent) 0%, #A07FD8 100%); opacity: 0; }
.metric:first-child::before { opacity: 1; }
.metric-label { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
.metric-val { font-size: 20px; font-weight: 600; font-family: 'DM Mono', monospace; letter-spacing: -0.5px; }
.metric-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
.val-liss { color: var(--liss); }
.val-anye { color: var(--anye); }

.meta-card { background: var(--card); border-radius: var(--radius); padding: 16px; border: 1px solid var(--border-soft); margin-bottom: 16px; }
.meta-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.meta-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; }
.meta-edit { background: none; border: none; font-size: 12px; color: var(--accent); font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; padding: 2px 6px; border-radius: 4px; }
.meta-edit:hover { background: var(--liss-bg); }
.meta-numbers { display: flex; align-items: baseline; gap: 6px; margin-bottom: 10px; }
.meta-gastado { font-size: 18px; font-weight: 600; font-family: 'DM Mono', monospace; }
.meta-de { font-size: 12px; color: var(--text3); }
.meta-presupuesto { font-size: 14px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--text2); }
.meta-bar-wrap { height: 8px; background: #EDE8F5; border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
.meta-bar-fill { height: 100%; border-radius: 4px; transition: width .5s cubic-bezier(.4,0,.2,1); background: linear-gradient(90deg, var(--accent), #A07FD8); }
.meta-bar-fill.warning { background: linear-gradient(90deg, #D4A050, #E8872A); }
.meta-bar-fill.danger  { background: linear-gradient(90deg, var(--danger), #E85A3A); }
.meta-footer { display: flex; justify-content: space-between; font-size: 11px; }
.meta-pct { font-weight: 700; }
.meta-restante { color: var(--text3); }

.meta-input-wrap { display: flex; gap: 8px; margin-top: 8px; }
.meta-input { flex: 1; padding: 9px 12px; border: 1.5px solid var(--accent); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; }
.meta-save { padding: 9px 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }

.balance-card { background: var(--card); border-radius: var(--radius); padding: 18px; border: 1px solid var(--border-soft); margin-bottom: 16px; }
.balance-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.bal-person { flex: 1; }
.bal-name { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
.bal-num { font-size: 17px; font-weight: 600; font-family: 'DM Mono', monospace; }
.bal-vs { font-size: 11px; color: var(--text3); font-weight: 500; }
.balance-result { background: var(--surface2); border-radius: var(--radius-sm); padding: 11px 14px; }
.balance-result-lbl { font-size: 10px; color: var(--text3); margin-bottom: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; }
.balance-result-val { font-size: 14px; font-weight: 600; }
.val-danger { color: var(--danger); }
.val-success { color: var(--success); }

.chart-card { background: var(--card); border-radius: var(--radius); padding: 16px; border: 1px solid var(--border-soft); margin-bottom: 16px; }
.chart-title { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 14px; }
.chart-wrap { display: flex; align-items: center; gap: 16px; }
.chart-svg-wrap { flex-shrink: 0; }
.chart-legend { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.legend-name { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.legend-pct { font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--text); flex-shrink: 0; }

.section-title { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; }
.cat-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.cat-item { background: var(--card); border-radius: var(--radius-sm); padding: 12px 14px; border: 1px solid var(--border-soft); }
.cat-item-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.cat-name-row { display: flex; align-items: center; gap: 8px; }
.cat-emoji { font-size: 15px; flex-shrink: 0; }
.cat-name-txt { font-size: 13px; font-weight: 500; }
.cat-total { font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; }
.cat-bar-wrap { height: 4px; background: #EDE8F5; border-radius: 2px; overflow: hidden; margin-bottom: 6px; display: flex; }
.cat-bar-liss { height: 100%; border-radius: 2px 0 0 2px; background: var(--liss); transition: width .4s; }
.cat-bar-anye { height: 100%; border-radius: 0 2px 2px 0; background: var(--anye); transition: width .4s; }
.cat-split { display: flex; justify-content: space-between; font-size: 10px; }
.cat-split-l { color: var(--liss-text); font-weight: 600; }
.cat-split-a { color: var(--anye-text); font-weight: 600; }

.expense-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 80px; }
@media (min-width: 768px) { .expense-list { margin-bottom: 20px; } }
.exp-card { background: var(--card); border-radius: var(--radius-sm); padding: 12px 14px; border: 1px solid var(--border-soft); display: flex; align-items: center; gap: 10px; }
.exp-emoji { font-size: 16px; flex-shrink: 0; }
.exp-body { flex: 1; min-width: 0; }
.exp-desc { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.exp-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.exp-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.exp-amount { font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; }
.exp-badge { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
.badge-liss { background: var(--liss-bg); color: var(--liss-text); }
.badge-anye { background: var(--anye-bg); color: var(--anye-text); }
.exp-del { background: none; border: none; color: var(--text3); font-size: 16px; cursor: pointer; padding: 4px; flex-shrink: 0; line-height: 1; }
.exp-del:hover { color: var(--danger); }

.reg-card { background: var(--card); border-radius: var(--radius); padding: 24px; border: 1px solid var(--border-soft); margin-bottom: 16px; }
.reg-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; margin-bottom: 20px; color: var(--text); }
.field { margin-bottom: 16px; }
.field label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; display: block; margin-bottom: 7px; }
.field input, .field select { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border-soft); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--card); outline: none; transition: border-color .2s, box-shadow .2s; -webkit-appearance: none; appearance: none; }
.field input:focus, .field select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.quien-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.quien-btn { padding: 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--border-soft); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; background: var(--card); color: var(--text2); transition: all .15s; text-align: center; }
.quien-btn.active-liss { border-color: var(--liss); background: var(--liss-bg); color: var(--liss-text); box-shadow: 0 0 0 3px var(--accent-glow); }
.quien-btn.active-anye { border-color: var(--anye); background: var(--anye-bg); color: var(--anye-text); }
.cat-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.chip { padding: 6px 11px; border-radius: 20px; border: 1.5px solid var(--border-soft); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; background: var(--card); color: var(--text2); transition: all .15s; }
.chip.active { border-color: var(--accent); background: var(--liss-bg); color: var(--liss-text); font-weight: 600; }

.division-toggle { display: flex; flex-direction: column; gap: 8px; }
.div-btn { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border-soft); background: var(--card); cursor: pointer; font-family: 'DM Sans', sans-serif; text-align: left; transition: all .15s; width: 100%; }
.div-btn:hover { border-color: var(--border); background: var(--surface2); }
.div-icon  { font-size: 18px; flex-shrink: 0; }
.div-label { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
.div-sub   { font-size: 11px; color: var(--text3); }
.div-btn.active-div { border-color: var(--accent); background: var(--liss-bg); box-shadow: 0 0 0 3px var(--accent-glow); }
.div-btn.active-div .div-label { color: var(--liss-text); }
.div-btn.active-div .div-sub   { color: var(--liss); }
@media (min-width: 480px) {
  .division-toggle { flex-direction: row; }
  .div-btn { flex-direction: column; align-items: flex-start; gap: 4px; flex: 1; }
  .div-sub { font-size: 10px; }
}

.btn-submit { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--liss) 0%, #9B7FD4 100%); color: #fff; border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 6px; transition: opacity .15s, transform .1s; }
.btn-submit:active { opacity: .88; transform: scale(.99); }
.btn-submit:disabled { opacity: .45; cursor: not-allowed; transform: none; }

.cierre-banner { background: #FDF8EC; border: 1.5px solid #E8C97A; border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.cierre-banner-icon { font-size: 16px; }
.cierre-banner-txt { font-size: 12px; color: #7A5C00; font-weight: 500; line-height: 1.4; }
.cierre-banner-txt strong { display: block; font-size: 13px; margin-bottom: 1px; }
.btn-cierre { width: 100%; padding: 13px; background: none; border: 1.5px solid rgba(192,57,43,0.35); border-radius: var(--radius); color: var(--danger); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; margin-top: 4px; }
.btn-cierre:hover { background: #FDF0EE; border-color: var(--danger); }

.btn-resumen { width: 100%; padding: 13px; background: none; border: 1.5px solid rgba(45,125,98,0.35); border-radius: var(--radius); color: var(--success); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; margin-top: 8px; }
.btn-resumen:hover { background: #EDF7F3; border-color: var(--success); }

.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: #fff; padding: 11px 20px; border-radius: 99px; font-size: 13px; font-weight: 500; transition: transform .3s cubic-bezier(.34,1.56,.64,1); z-index: 999; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.18); }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.ok  { background: var(--success); }
.toast.err { background: var(--danger); }

.loading { text-align: center; padding: 48px 20px; color: var(--text3); font-size: 13px; }
.spinner { width: 26px; height: 26px; border: 2px solid #EDE8F5; border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 48px 20px; color: var(--text3); }
.empty-icon { font-size: 34px; margin-bottom: 10px; opacity: .6; }
.empty-txt { font-size: 13px; }

.filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; scrollbar-width: none; }
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip { flex-shrink: 0; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border-soft); font-size: 11px; font-weight: 600; cursor: pointer; background: var(--card); color: var(--text2); white-space: nowrap; transition: all .15s; }
.filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(28,22,37,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(2px); }
.modal-overlay.show { display: flex; }
.modal { background: var(--card); border-radius: var(--radius); padding: 28px; max-width: 380px; width: 100%; box-shadow: 0 24px 60px rgba(28,22,37,0.22); animation: modalIn .22s cubic-bezier(.34,1.56,.64,1); }
@keyframes modalIn { from { transform: scale(.93) translateY(8px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
.modal-icon { font-size: 30px; text-align: center; margin-bottom: 12px; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 8px; }
.modal-body { font-size: 13px; color: var(--text2); text-align: center; line-height: 1.5; margin-bottom: 18px; }
.modal-resumen { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
.modal-row { display: flex; justify-content: space-between; font-size: 13px; }
.modal-row span:first-child { color: var(--text3); }
.modal-row span:last-child { font-weight: 600; font-family: 'DM Mono', monospace; }
.modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-btn-cancel { padding: 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--border-soft); background: var(--card); color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; }
.modal-btn-cancel:hover { background: var(--surface2); }
.modal-btn-confirm { padding: 12px; border-radius: var(--radius-sm); border: none; background: linear-gradient(135deg, var(--liss) 0%, #9B7FD4 100%); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }
.modal-btn-confirm:disabled { opacity: .5; cursor: not-allowed; }

.wsp-text { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px; font-size: 12px; line-height: 1.7; color: var(--text); white-space: pre-wrap; word-break: break-word; margin-bottom: 16px; max-height: 300px; overflow-y: auto; font-family: 'DM Mono', monospace; }
.btn-copy { width: 100%; padding: 13px; background: linear-gradient(135deg, #25D366, #128C7E); color: #fff; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }

.modal-meta-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--accent); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 16px; color: var(--text); outline: none; margin-bottom: 16px; text-align: center; }
</style>
</head>
<body>
<div class="app">

  <div class="sidebar">
    <div class="sidebar-avatar">L&amp;A</div>
    <div class="sidebar-brand">
      <div class="sidebar-eyebrow">Nuestro Kakebo</div>
      <div class="sidebar-title"><em>Liss</em> &amp; Anye</div>
    </div>
    <div class="sidebar-divider"></div>
    <label class="sidebar-mes-lbl">Mes</label>
    <select class="sidebar-mes-select" id="selMesDesktop" onchange="cambiarMes(this.value)"></select>
    <nav class="sidebar-nav">
      <button class="nav-item active" id="nav-dashboard" onclick="showTab('dashboard')"><span class="nav-icon">◈</span> Dashboard</button>
      <button class="nav-item" id="nav-registro" onclick="showTab('registro')"><span class="nav-icon">＋</span> Registrar gasto</button>
    </nav>
    <div class="sidebar-footer"><div class="sidebar-footer-name">Kakebo · Liss &amp; Anye</div></div>
  </div>

  <div class="main-desktop">

    <div class="header">
      <div class="header-top">
        <div class="header-brand">
          <div class="header-eyebrow">Nuestro Kakebo</div>
          <div class="header-title"><em>Liss</em> &amp; Anye</div>
        </div>
        <select class="mes-pill" id="selMesMobile" onchange="cambiarMes(this.value)"></select>
      </div>
      <div class="tabs">
        <div class="tab active" id="tab-dashboard" onclick="showTab('dashboard')">Dashboard</div>
        <div class="tab" id="tab-registro" onclick="showTab('registro')">+ Registrar</div>
      </div>
    </div>

    <div class="desktop-topbar">
      <div>
        <div class="desktop-topbar-title" id="topbarTitle">Dashboard</div>
        <div class="desktop-topbar-sub" id="topbarSub">Resumen del mes</div>
      </div>
    </div>

    <div class="content">

      <div class="page active" id="page-dashboard">
        <div id="dashContent">
          <div class="loading"><div class="spinner"></div>Cargando...</div>
        </div>
      </div>

      <div class="page" id="page-registro">
        <div class="reg-card">
          <div class="reg-title">Nuevo gasto</div>
          <div class="reg-grid">

            <div class="field field-full">
              <label>¿Quién pagó?</label>
              <div class="quien-toggle">
                <button class="quien-btn active-liss" id="btnLiss" onclick="setQuien('Liss')">Liss</button>
                <button class="quien-btn" id="btnAnye" onclick="setQuien('Anye')">Anye</button>
              </div>
            </div>

            <div class="field">
              <label>Descripción</label>
              <input type="text" id="fDesc" placeholder="Ej: Tottus, Uber..." autocomplete="off">
            </div>

            <div class="field">
              <label>Monto ($)</label>
              <input type="number" id="fMonto" placeholder="Ej: 45000" inputmode="numeric">
            </div>

            <div class="field">
              <label>Fecha</label>
              <input type="date" id="fFecha">
            </div>

            <div class="field field-full">
              <label>Categoría</label>
              <div class="cat-chips" id="catChips"></div>
            </div>

            <div class="field field-full">
              <label>¿Cómo se divide?</label>
              <div class="division-toggle">
                <button class="div-btn active-div" id="div50" onclick="setDivision('50/50')">
                  <span class="div-icon">⚖️</span><span class="div-label">50 / 50</span><span class="div-sub">Entre las dos</span>
                </button>
                <button class="div-btn" id="div100L" onclick="setDivision('100% Liss')">
                  <span class="div-icon">💜</span><span class="div-label">100% Liss</span><span class="div-sub">Anye paga el total</span>
                </button>
                <button class="div-btn" id="div100A" onclick="setDivision('100% Anye')">
                  <span class="div-icon">🧡</span><span class="div-label">100% Anye</span><span class="div-sub">Liss paga el total</span>
                </button>
              </div>
            </div>

            <div class="field field-full">
              <button class="btn-submit" id="btnGuardar" onclick="guardarGasto()">Guardar gasto</button>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-icon">🔒</div>
    <div class="modal-title" id="modalTitle">Cerrar mes</div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-resumen" id="modalResumen"></div>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="modal-btn-confirm" id="modalBtnConfirm" onclick="ejecutarCierre()">Cerrar mes</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalWsp">
  <div class="modal">
    <div class="modal-icon">💬</div>
    <div class="modal-title">Resumen del mes</div>
    <div class="modal-body">Listo para copiar y enviar</div>
    <div class="wsp-text" id="wspText"></div>
    <button class="btn-copy" onclick="copiarResumen()">📋 Copiar resumen</button>
    <div style="margin-top:10px">
      <button class="modal-btn-cancel" style="width:100%" onclick="cerrarWsp()">Cerrar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalMeta">
  <div class="modal">
    <div class="modal-icon">🎯</div>
    <div class="modal-title">Meta mensual</div>
    <div class="modal-body">¿Cuánto quieren gastar este mes entre las dos?</div>
    <input class="modal-meta-input" type="number" id="metaInput" placeholder="Ej: 1500000" inputmode="numeric">
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="cerrarModalMeta()">Cancelar</button>
      <button class="modal-btn-confirm" onclick="guardarMeta()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATS = [
  { name: 'Alimentación',         emoji: '🛒', color: '#7C5CBF' },
  { name: 'Transporte',           emoji: '🚗', color: '#5B8FD4' },
  { name: 'Viajes',               emoji: '✈️', color: '#C0756A' },
  { name: 'Eventos',              emoji: '🎉', color: '#D4537E' },
  { name: 'Regalos',              emoji: '🎁', color: '#D4A050' },
  { name: 'Bares / Restaurantes', emoji: '🍽️', color: '#6BAA7A' },
  { name: 'Arriendo',             emoji: '🏠', color: '#888780' },
  { name: 'Hogar',                emoji: '🪴', color: '#5F9E7A' },
  { name: 'Mascota',              emoji: '🐾', color: '#B07FD4' },
  { name: 'Salidas',              emoji: '🌙', color: '#9B7FD4' },
  { name: 'Otros',                emoji: '📦', color: '#A89DB8' },
];

let gastos      = [];
let cierres     = [];
let mesSel      = '';
let quienSel    = 'Liss';
let catSel      = 'Alimentación';
let catFiltro   = 'Todos';
let divisionSel = '50/50';
let metaMensual = 0;

window.onload = () => {
  setFechaHoy();
  buildCatChips();
  cargarMeta();
  cargarTodo();
};

function cargarMeta() {
  try {
    const saved = localStorage.getItem('kakebo_meta_' + getMesLabel(new Date()));
    metaMensual = saved ? parseInt(saved) : 0;
  } catch(e) { metaMensual = 0; }
}

function setFechaHoy() {
  const hoy = new Date();
  document.getElementById('fFecha').value =
    `${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}-${String(hoy.getDate()).padStart(2,'0')}`;
}

function buildCatChips() {
  document.getElementById('catChips').innerHTML = CATS.map(c =>
    `<div class="chip${c.name===catSel?' active':''}" onclick="setCat('${c.name}')">${c.emoji} ${c.name}</div>`
  ).join('');
}

function showTab(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const mTab = document.getElementById('tab-'+id); if (mTab) mTab.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const dNav = document.getElementById('nav-'+id); if (dNav) dNav.classList.add('active');
  const titles = { dashboard:'Dashboard', registro:'Registrar gasto' };
  const subs   = { dashboard:'Resumen del mes', registro:'Nuevo registro' };
  const tb = document.getElementById('topbarTitle'); if (tb) tb.textContent = titles[id]||'';
  const ts = document.getElementById('topbarSub');   if (ts) ts.textContent = subs[id]||'';
}

const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbwZ_lMDlslIntt6hmWVuY4ECVRkS9m2OhjU_5mSKC0o9kdH_rfpl3ap6UNObqrVLRCsKA/exec';

function apiFetch(params) {
  const url = WEBAPP_URL + '?' + new URLSearchParams(params).toString();
  return fetch(url).then(r => r.json());
}

function cargarTodo() {
  apiFetch({ action: 'getGastos' })
    .then(res => {
      if (!res.ok) { showToast('Error cargando datos','err'); return; }
      const todos = res.gastos || [];
      gastos  = todos.filter(g => g.cat !== '__CIERRE__');
      cierres = todos.filter(g => g.cat === '__CIERRE__').map(g => g.mes);
      poblarMeses();
      renderDash();
    })
    .catch(e => showToast('Error: '+(e.message||e),'err'));
}

function poblarMeses() {
  const meses = new Set(gastos.map(g => g.mes));
  cierres.forEach(m => meses.add(m));
  meses.add(getMesLabel(new Date()));
  const arr = Array.from(meses).reverse();
  if (!mesSel || !arr.includes(mesSel)) mesSel = arr[0];
  const opts = arr.map(m=>`<option value="${m}"${m===mesSel?' selected':''}>${m}</option>`).join('');
  document.getElementById('selMesMobile').innerHTML  = opts;
  document.getElementById('selMesDesktop').innerHTML = opts;
}

function cambiarMes(val) {
  mesSel = val;
  document.getElementById('selMesMobile').value  = val;
  document.getElementById('selMesDesktop').value = val;
  catFiltro = 'Todos';
  cargarMeta();
  renderDash();
}

function renderDash() {
  const lista     = gastos.filter(g => g.mes === mesSel);
  const esCerrado = cierres.includes(mesSel);

  const pagLiss = lista.filter(g=>g.quien==='Liss').reduce((a,g)=>a+g.monto,0);
  const pagAnye = lista.filter(g=>g.quien==='Anye').reduce((a,g)=>a+g.monto,0);
  const total   = pagLiss + pagAnye;
  const mitad   = total / 2;

  let deudaAnye = 0;
  lista.forEach(g => {
    const div = g.division || '50/50';
    if (div==='50/50') {
      if (g.quien==='Liss') deudaAnye += g.monto/2; else deudaAnye -= g.monto/2;
    } else if (div==='100% Anye') {
      if (g.quien==='Liss') deudaAnye += g.monto;
    } else if (div==='100% Liss') {
      if (g.quien==='Anye') deudaAnye -= g.monto;
    }
  });

  let balHtml = '';
  if (total===0) {
    balHtml = `<div class="balance-result"><div class="balance-result-val" style="color:var(--text3)">Sin gastos registrados</div></div>`;
  } else if (Math.abs(deudaAnye)<500) {
    balHtml = `<div class="balance-result"><div class="balance-result-lbl">Balance</div><div class="balance-result-val val-success">Están al día ✓</div></div>`;
  } else if (deudaAnye>0) {
    balHtml = `<div class="balance-row">
      <div class="bal-person"><div class="bal-name">Liss pagó</div><div class="bal-num val-liss">${fmt(pagLiss)}</div></div>
      <div class="bal-vs">vs</div>
      <div class="bal-person" style="text-align:right"><div class="bal-name">Anye pagó</div><div class="bal-num val-anye">${fmt(pagAnye)}</div></div>
    </div>
    <div class="balance-result"><div class="balance-result-lbl">Balance</div><div class="balance-result-val val-danger">Anye le debe ${fmt(deudaAnye)} a Liss</div></div>`;
  } else {
    balHtml = `<div class="balance-row">
      <div class="bal-person"><div class="bal-name">Liss pagó</div><div class="bal-num val-liss">${fmt(pagLiss)}</div></div>
      <div class="bal-vs">vs</div>
      <div class="bal-person" style="text-align:right"><div class="bal-name">Anye pagó</div><div class="bal-num val-anye">${fmt(pagAnye)}</div></div>
    </div>
    <div class="balance-result"><div class="balance-result-lbl">Balance</div><div class="balance-result-val val-danger">Liss le debe ${fmt(Math.abs(deudaAnye))} a Anye</div></div>`;
  }

  let metaHtml = '';
  if (total > 0 || metaMensual > 0) {
    const meta   = metaMensual || 0;
    const pct    = meta > 0 ? Math.min(Math.round(total/meta*100), 100) : 0;
    const cls    = pct >= 100 ? 'danger' : pct >= 80 ? 'warning' : '';
    const restante = meta > 0 ? meta - total : 0;
    metaHtml = `<div class="meta-card">
      <div class="meta-header">
        <div class="meta-label">🎯 Meta mensual</div>
        <button class="meta-edit" onclick="abrirModalMeta()">${meta>0?'Editar':'+ Fijar meta'}</button>
      </div>
      ${meta > 0 ? `
        <div class="meta-numbers">
          <div class="meta-gastado ${cls==='danger'?'val-danger':cls==='warning'?'':'val-liss'}">${fmt(total)}</div>
          <div class="meta-de">de</div>
          <div class="meta-presupuesto">${fmt(meta)}</div>
        </div>
        <div class="meta-bar-wrap"><div class="meta-bar-fill ${cls}" style="width:${pct}%"></div></div>
        <div class="meta-footer">
          <span class="meta-pct ${cls==='danger'?'val-danger':cls==='warning'?'':'val-liss'}">${pct}% usado</span>
          <span class="meta-restante">${restante>=0?fmt(restante)+' disponible':'⚠️ '+fmt(Math.abs(restante))+' sobre el límite'}</span>
        </div>` : `<div style="font-size:12px;color:var(--text3)">Fija una meta para hacer seguimiento del presupuesto mensual.</div>`}
    </div>`;
  } else {
    metaHtml = `<div class="meta-card">
      <div class="meta-header">
        <div class="meta-label">🎯 Meta mensual</div>
        <button class="meta-edit" onclick="abrirModalMeta()">+ Fijar meta</button>
      </div>
      <div style="font-size:12px;color:var(--text3)">Fija una meta para hacer seguimiento del presupuesto mensual.</div>
    </div>`;
  }

  const catTotales = {};
  CATS.forEach(c => { catTotales[c.name] = { liss:0, anye:0 }; });
  lista.forEach(g => {
    if (!catTotales[g.cat]) catTotales[g.cat] = { liss:0, anye:0 };
    catTotales[g.cat][g.quien==='Liss'?'liss':'anye'] += g.monto;
  });
  const maxCat = Math.max(...CATS.map(c=>catTotales[c.name].liss+catTotales[c.name].anye),1);
  const catsConGasto = CATS.filter(c=>(catTotales[c.name].liss+catTotales[c.name].anye)>0);

  const catHtml = catsConGasto.length===0 ? '' : catsConGasto
    .sort((a,b)=>(catTotales[b.name].liss+catTotales[b.name].anye)-(catTotales[a.name].liss+catTotales[a.name].anye))
    .map(c => {
      const cl=catTotales[c.name].liss, ca=catTotales[c.name].anye, ct=cl+ca;
      const pctL=Math.round(cl/maxCat*100), pctA=Math.round(ca/maxCat*100);
      return `<div class="cat-item">
        <div class="cat-item-top">
          <div class="cat-name-row"><span class="cat-emoji">${c.emoji}</span><div class="cat-name-txt">${c.name}</div></div>
          <div class="cat-total">${fmt(ct)}</div>
        </div>
        <div class="cat-bar-wrap"><div class="cat-bar-liss" style="width:${pctL}%"></div><div class="cat-bar-anye" style="width:${pctA}%"></div></div>
        <div class="cat-split"><span class="cat-split-l">L: ${fmt(cl)}</span><span class="cat-split-a">A: ${fmt(ca)}</span></div>
      </div>`;
    }).join('');

  const pieHtml = buildPieChart(catsConGasto, catTotales, total);

  const filtros    = ['Todos',...catsConGasto.map(c=>c.name)];
  const filtroHtml = filtros.map(f=>`<div class="filter-chip${catFiltro===f?' active':''}" onclick="setFiltro('${f}')">${f}</div>`).join('');
  const listaFiltrada = catFiltro==='Todos' ? lista : lista.filter(g=>g.cat===catFiltro);
  const expHtml = listaFiltrada.length===0
    ? `<div class="empty"><div class="empty-icon">✦</div><div class="empty-txt">Sin gastos este mes</div></div>`
    : listaFiltrada.slice().reverse().map(g => {
        const cc  = CATS.find(c=>c.name===g.cat) || { emoji:'📦', color:'#888' };
        const div = g.division || '50/50';
        const divBadge = div!=='50/50' ? `<span class="exp-badge" style="background:#FDF0EE;color:#8B3A30">${div}</span>` : '';
        return `<div class="exp-card">
          <div class="exp-emoji">${cc.emoji}</div>
          <div class="exp-body"><div class="exp-desc">${g.desc}</div><div class="exp-meta">${g.cat} · ${formatFecha(g.fecha)}</div></div>
          <div class="exp-right">
            <div class="exp-amount">${fmt(g.monto)}</div>
            <span class="exp-badge badge-${g.quien.toLowerCase()}">${g.quien}</span>
            ${divBadge}
          </div>
          <button class="exp-del" onclick="eliminar(${g.id})">×</button>
        </div>`;
      }).join('');

  const cierreBanner = esCerrado
    ? `<div class="cierre-banner"><div class="cierre-banner-icon">🔒</div><div class="cierre-banner-txt"><strong>${mesSel} cerrado</strong>Solo lectura.</div></div>` : '';

  const acciones = !esCerrado && lista.length > 0
    ? `<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border-soft);display:flex;flex-direction:column;gap:8px;">
         <button class="btn-resumen" onclick="abrirResumenWsp()">💬 Generar resumen para copiar</button>
         <button class="btn-cierre"  onclick="abrirModalCierre()">🔒 Cerrar ${mesSel}</button>
       </div>`
    : lista.length > 0
    ? `<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border-soft)">
         <button class="btn-resumen" onclick="abrirResumenWsp()">💬 Generar resumen para copiar</button>
       </div>` : '';

  document.getElementById('dashContent').innerHTML = `
    ${cierreBanner}
    ${metaHtml}
    <div class="metrics">
      <div class="metric"><div class="metric-label">Total mes</div><div class="metric-val">${fmt(total)}</div><div class="metric-sub">${lista.length} gastos</div></div>
      <div class="metric"><div class="metric-label">Cada una paga</div><div class="metric-val">${fmt(mitad)}</div><div class="metric-sub">50% del total</div></div>
      <div class="metric"><div class="metric-label">Pagó Liss</div><div class="metric-val val-liss">${fmt(pagLiss)}</div><div class="metric-sub">${total?Math.round(pagLiss/total*100):0}%</div></div>
      <div class="metric"><div class="metric-label">Pagó Anye</div><div class="metric-val val-anye">${fmt(pagAnye)}</div><div class="metric-sub">${total?Math.round(pagAnye/total*100):0}%</div></div>
    </div>
    <div class="balance-card">${balHtml}</div>
    <div class="dash-grid">
      <div class="dash-col">
        ${catsConGasto.length>0 ? `${pieHtml}<div class="section-title">Por categoría</div><div class="cat-list">${catHtml}</div>` : ''}
      </div>
      <div class="dash-col">
        <div class="section-title">Gastos</div>
        <div class="filter-row">${filtroHtml}</div>
        <div class="expense-list">${expHtml}</div>
      </div>
    </div>
    ${acciones}
  `;
}

function buildPieChart(cats, totales, totalGlobal) {
  if (cats.length === 0 || totalGlobal === 0) return '';
  const SIZE = 110, CX = SIZE/2, CY = SIZE/2, R = 44, STROKE = 18;
  const circum = 2 * Math.PI * R;
  let offset = 0;
  const slices = cats
    .sort((a,b)=>(totales[b.name].liss+totales[b.name].anye)-(totales[a.name].liss+totales[a.name].anye))
    .slice(0, 8)
    .map(c => {
      const val = totales[c.name].liss + totales[c.name].anye;
      const pct = val / totalGlobal;
      const dash = pct * circum;
      const gap  = circum - dash;
      const slice = `<circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="${c.color}" stroke-width="${STROKE}" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset * circum}" transform="rotate(-90 ${CX} ${CY})" />`;
      offset += pct;
      return { slice, name: c.name, emoji: c.emoji, color: c.color, pct: Math.round(pct*100) };
    });

  const svgSlices = slices.map(s=>s.slice).join('');
  const legendItems = slices.map(s=>`
    <div class="legend-item">
      <div class="legend-dot" style="background:${s.color}"></div>
      <span class="legend-name">${s.emoji} ${s.name}</span>
      <span class="legend-pct">${s.pct}%</span>
    </div>`).join('');

  return `<div class="chart-card">
    <div class="chart-title">Distribución por categoría</div>
    <div class="chart-wrap">
      <div class="chart-svg-wrap">
        <svg width="${SIZE}" height="${SIZE}" viewBox="0 0 ${SIZE} ${SIZE}">
          <circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="#EDE8F5" stroke-width="${STROKE}"/>
          ${svgSlices}
        </svg>
      </div>
      <div class="chart-legend">${legendItems}</div>
    </div>
  </div>`;
}

function setFiltro(f) { catFiltro = f; renderDash(); }

function setQuien(q) {
  quienSel = q;
  document.getElementById('btnLiss').className = 'quien-btn'+(q==='Liss'?' active-liss':'');
  document.getElementById('btnAnye').className = 'quien-btn'+(q==='Anye'?' active-anye':'');
}
function setCat(c) { catSel = c; buildCatChips(); }
function setDivision(d) {
  divisionSel = d;
  document.getElementById('div50').className   = 'div-btn'+(d==='50/50'    ?' active-div':'');
  document.getElementById('div100L').className = 'div-btn'+(d==='100% Liss'?' active-div':'');
  document.getElementById('div100A').className = 'div-btn'+(d==='100% Anye'?' active-div':'');
}

function guardarGasto() {
  const desc  = document.getElementById('fDesc').value.trim();
  const monto = parseInt(document.getElementById('fMonto').value);
  const fecha = document.getElementById('fFecha').value;
  if (!desc)               { showToast('Escribe una descripción','err'); return; }
  if (!monto||monto<=0)    { showToast('Ingresa un monto válido','err'); return; }
  if (!fecha)              { showToast('Selecciona una fecha','err'); return; }

  const btn = document.getElementById('btnGuardar');
  btn.disabled=true; btn.textContent='Guardando...';
  const id = Date.now();
  apiFetch({ action:'agregarGasto', id, mes: mesSel, fecha, desc, monto, cat: catSel, quien: quienSel, division: divisionSel })
    .then(res => {
      btn.disabled=false; btn.textContent='Guardar gasto';
      if (!res.ok) { showToast('Error: '+(res.error||'desconocido'),'err'); return; }
      document.getElementById('fDesc').value='';
      document.getElementById('fMonto').value='';
      setFechaHoy(); setDivision('50/50');
      showToast('Gasto guardado ✓','ok');
      cargarTodo();
    })
    .catch(e => { btn.disabled=false; btn.textContent='Guardar gasto'; showToast('Error: '+(e.message||e),'err'); });
}

function eliminar(id) {
  if (!confirm('¿Eliminar este gasto?')) return;
  apiFetch({ action:'eliminarGasto', id })
    .then(res => { if(!res.ok){showToast('No se pudo eliminar','err');return;} showToast('Eliminado','ok'); cargarTodo(); })
    .catch(()=>showToast('Error al eliminar','err'));
}

function abrirModalMeta() {
  document.getElementById('metaInput').value = metaMensual || '';
  document.getElementById('modalMeta').classList.add('show');
}
function cerrarModalMeta() { document.getElementById('modalMeta').classList.remove('show'); }
function guardarMeta() {
  const val = parseInt(document.getElementById('metaInput').value);
  if (!val || val <= 0) { showToast('Ingresa un monto válido','err'); return; }
  metaMensual = val;
  try { localStorage.setItem('kakebo_meta_'+mesSel, val); } catch(e){}
  cerrarModalMeta();
  showToast('Meta guardada ✓','ok');
  renderDash();
}

function abrirResumenWsp() {
  const lista = gastos.filter(g => g.mes === mesSel);
  const pagLiss = lista.filter(g=>g.quien==='Liss').reduce((a,g)=>a+g.monto,0);
  const pagAnye = lista.filter(g=>g.quien==='Anye').reduce((a,g)=>a+g.monto,0);
  const total   = pagLiss + pagAnye;

  let deudaAnye = 0;
  lista.forEach(g => {
    const div = g.division||'50/50';
    if (div==='50/50') { if(g.quien==='Liss') deudaAnye+=g.monto/2; else deudaAnye-=g.monto/2; }
    else if (div==='100% Anye') { if(g.quien==='Liss') deudaAnye+=g.monto; }
    else if (div==='100% Liss') { if(g.quien==='Anye') deudaAnye-=g.monto; }
  });

  const catTotales = {};
  lista.forEach(g => {
    if (!catTotales[g.cat]) catTotales[g.cat] = 0;
    catTotales[g.cat] += g.monto;
  });
  const catLines = Object.entries(catTotales)
    .sort((a,b)=>b[1]-a[1])
    .map(([cat, monto]) => {
      const c = CATS.find(x=>x.name===cat)||{emoji:'📦'};
      return `  ${c.emoji} ${cat}: ${fmt(monto)}`;
    }).join('\n');

  let balanceLinea = '';
  if (Math.abs(deudaAnye)<500) balanceLinea = '✅ Están al día';
  else if (deudaAnye>0) balanceLinea = `💸 Anye le debe ${fmt(deudaAnye)} a Liss`;
  else balanceLinea = `💸 Liss le debe ${fmt(Math.abs(deudaAnye))} a Anye`;

  const metaLinea = metaMensual > 0
    ? `\n🎯 Meta: ${fmt(metaMensual)} (${Math.round(total/metaMensual*100)}% usado)` : '';

  const texto = `📊 *Kakebo ${mesSel}*\n${'─'.repeat(24)}\n💜 Liss pagó: ${fmt(pagLiss)}\n🧡 Anye pagó: ${fmt(pagAnye)}\n💰 Total: ${fmt(total)}${metaLinea}\n\n📂 *Por categoría:*\n${catLines}\n\n⚖️ *Balance:*\n${balanceLinea}`;

  document.getElementById('wspText').textContent = texto;
  document.getElementById('modalWsp').classList.add('show');
}
function cerrarWsp() { document.getElementById('modalWsp').classList.remove('show'); }
function copiarResumen() {
  const txt = document.getElementById('wspText').textContent;
  navigator.clipboard.writeText(txt).then(()=>{ showToast('Copiado ✓','ok'); cerrarWsp(); }).catch(()=>{
    const ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copiado ✓','ok'); cerrarWsp();
  });
}

function calcDeuda(lista) {
  let d = 0;
  lista.forEach(g => {
    const div = g.division||'50/50';
    if (div==='50/50') { if(g.quien==='Liss') d+=g.monto/2; else d-=g.monto/2; }
    else if (div==='100% Anye') { if(g.quien==='Liss') d+=g.monto; }
    else if (div==='100% Liss') { if(g.quien==='Anye') d-=g.monto; }
  });
  return d;
}
function abrirModalCierre() {
  const lista = gastos.filter(g=>g.mes===mesSel);
  const liss  = lista.filter(g=>g.quien==='Liss').reduce((a,g)=>a+g.monto,0);
  const anye  = lista.filter(g=>g.quien==='Anye').reduce((a,g)=>a+g.monto,0);
  const total = liss+anye;
  const d     = calcDeuda(lista);
  const bal   = Math.abs(d)<500?'✓ Están al día':d>0?`Anye le debe ${fmt(d)} a Liss`:`Liss le debe ${fmt(Math.abs(d))} a Anye`;
  document.getElementById('modalTitle').textContent = `Cerrar ${mesSel}`;
  document.getElementById('modalBody').textContent  = 'El resumen quedará guardado en la hoja y el mes se marcará como cerrado.';
  document.getElementById('modalResumen').innerHTML = `
    <div class="modal-row"><span>Total</span><span>${fmt(total)}</span></div>
    <div class="modal-row"><span>Liss</span><span style="color:var(--liss)">${fmt(liss)}</span></div>
    <div class="modal-row"><span>Anye</span><span style="color:var(--anye)">${fmt(anye)}</span></div>
    <div class="modal-row"><span>Balance</span><span style="font-size:11px;color:var(--text2)">${bal}</span></div>`;
  document.getElementById('modalOverlay').classList.add('show');
}
function cerrarModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function ejecutarCierre() {
  const btn = document.getElementById('modalBtnConfirm');
  btn.disabled=true; btn.textContent='Cerrando...';
  apiFetch({ action:'cerrarMes', mes: mesSel })
    .then(res => {
      btn.disabled=false; btn.textContent='Cerrar mes'; cerrarModal();
      if (!res.ok) { showToast('Error: '+(res.error||'desconocido'),'err'); return; }
      showToast(`${mesSel} cerrado ✓`,'ok'); cargarTodo();
    })
    .catch(e => { btn.disabled=false; btn.textContent='Cerrar mes'; cerrarModal(); showToast('Error: '+(e.message||e),'err'); });
}

function fmt(n) { return '$'+Math.round(n).toLocaleString('es-CL'); }
function getMesLabel(d) {
  const m=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return m[d.getMonth()]+' '+d.getFullYear();
}
function formatFecha(f) {
  if (!f) return '';
  if (typeof f==='string'&&f.includes('-')) {
    const p=f.split('-');
    const d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
    return isNaN(d)?f:d.toLocaleDateString('es-CL',{day:'numeric',month:'short'});
  }
  const d=new Date(f); return isNaN(d)?f:d.toLocaleDateString('es-CL',{day:'numeric',month:'short'});
}
let toastTimer;
function showToast(msg,type) {
  const t=document.getElementById('toast'); t.textContent=msg;
  t.className='toast show '+(type||'');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.className='toast',2800);
}
</script>
