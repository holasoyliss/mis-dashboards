<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de viaje · Anexo N°8 — CDI Chile</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%2316BEcf' d='M8 40 L12 26 Q14 21 19 21 L45 21 Q50 21 52 26 L56 40 Z'/%3E%3Crect x='4' y='38' width='56' height='12' rx='6' fill='%2316BEcf'/%3E%3Cpath fill='%23FFFFFF' d='M17 24 L14 35 L30 35 L30 24 Z'/%3E%3Cpath fill='%23FFFFFF' d='M34 24 L34 35 L50 35 L47 24 Z'/%3E%3Ccircle cx='17' cy='50' r='7' fill='%231A1A1A'/%3E%3Ccircle cx='17' cy='50' r='3' fill='%23E2E2E2'/%3E%3Ccircle cx='47' cy='50' r='7' fill='%231A1A1A'/%3E%3Ccircle cx='47' cy='50' r='3' fill='%23E2E2E2'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23FFFFFF'/%3E%3Cpath fill='%2316BEcf' d='M8 40 L12 26 Q14 21 19 21 L45 21 Q50 21 52 26 L56 40 Z'/%3E%3Crect x='4' y='38' width='56' height='12' rx='6' fill='%2316BEcf'/%3E%3Cpath fill='%23FFFFFF' d='M17 24 L14 35 L30 35 L30 24 Z'/%3E%3Cpath fill='%23FFFFFF' d='M34 24 L34 35 L50 35 L47 24 Z'/%3E%3Ccircle cx='17' cy='50' r='7' fill='%231A1A1A'/%3E%3Ccircle cx='17' cy='50' r='3' fill='%23E2E2E2'/%3E%3Ccircle cx='47' cy='50' r='7' fill='%231A1A1A'/%3E%3Ccircle cx='47' cy='50' r='3' fill='%23E2E2E2'/%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap');

  :root {
    --rojo: #EE3124;
    --naranja: #F58220;
    --amarillo: #FDB940;
    --verde: #4AB969;
    --azul: #16BEcf;
    --purpura: #5A3795;
    --negro: #1A1A1A;
    --gris: #8A8A8A;
    --gris-claro: #F4F4F4;
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Nunito', Arial, sans-serif;
    background: var(--gris-claro);
    margin: 0;
    padding: 32px 16px;
    color: var(--negro);
  }

  .card {
    max-width: 480px;
    margin: 0 auto;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  .franja {
    height: 6px;
    display: flex;
  }
  .franja span { flex: 1; }

  .contenido { padding: 28px 28px 24px; }

  .marca {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }

  .marca svg { flex-shrink: 0; }

  .marca-texto {
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 0.5px;
    color: var(--negro);
  }
  .marca-texto span { color: var(--azul); }

  h1 {
    font-size: 21px;
    font-weight: 900;
    margin: 0 0 2px;
    color: var(--negro);
  }

  .subtitulo {
    font-size: 13px;
    color: var(--gris);
    margin: 0 0 4px;
    font-weight: 600;
  }

  .proyecto {
    font-size: 11.5px;
    color: var(--gris);
    margin: 0 0 22px;
    font-weight: 600;
    line-height: 1.4;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: var(--negro);
    margin-top: 16px;
    margin-bottom: 6px;
  }

  input, textarea {
    width: 100%;
    padding: 11px 13px;
    border: 1.5px solid #E2E2E2;
    border-radius: 10px;
    font-family: 'Nunito', Arial, sans-serif;
    font-size: 14px;
    resize: vertical;
    transition: border-color 0.15s;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: var(--azul);
  }

  button {
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    background: var(--naranja);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Nunito', Arial, sans-serif;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    transition: background 0.15s;
  }

  button:hover:not(:disabled) { background: #DD7415; }
  button:disabled { background: var(--gris); cursor: not-allowed; }

  #mensaje {
    margin-top: 14px;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    min-height: 18px;
  }

  .ok { color: var(--verde); }
  .error { color: var(--rojo); }
  .cargando { color: var(--gris); }

  footer {
    text-align: center;
    font-size: 11px;
    color: var(--gris);
    padding: 14px 0 22px;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="card">
  <div class="franja">
    <span style="background:var(--rojo)"></span>
    <span style="background:var(--naranja)"></span>
    <span style="background:var(--amarillo)"></span>
    <span style="background:var(--verde)"></span>
    <span style="background:var(--azul)"></span>
    <span style="background:var(--purpura)"></span>
  </div>

  <div class="contenido">
    <div class="marca">
      <svg width="28" height="28" viewBox="0 0 28 28">
        <path d="M14 1 A13 13 0 1 1 13.9 27 L13.9 21 A7 7 0 1 0 14 7 Z" fill="#16BEcf"/>
      </svg>
      <div class="marca-texto">CDI <span>Chile</span></div>
    </div>

    <h1>Registro de viaje</h1>
    <p class="subtitulo">Anexo N°8 · Combustible y peajes</p>
    <p class="proyecto">IL-00089-25 — Red Conecta Mujer: Participación, Diversidad y Tech para el Desarrollo</p>

    <form id="form">
      <label for="descripcion">Descripción recorrido</label>
      <textarea id="descripcion" rows="2" required placeholder="DESDE: PROVIDENCIA&#10;HASTA: ALHUÉ"></textarea>

      <label for="fecha">Fecha cometido</label>
      <input type="date" id="fecha" required>

      <label for="motivo">Motivo</label>
      <textarea id="motivo" rows="2" required placeholder="Ej: Reunión mesa técnica de turismo"></textarea>

      <label for="kms">Kms</label>
      <input type="number" id="kms" step="0.1" min="0" required placeholder="Ej: 300">

      <label for="valorCombustible">Valor combustible</label>
      <input type="number" id="valorCombustible" step="1" min="0" required placeholder="Ej: 30729">

      <button type="submit" id="btnGuardar">Guardar viaje</button>
    </form>

    <div id="mensaje"></div>
  </div>
</div>

<footer>CDI Chile · Fondo Comunidad Activa 2025</footer>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvorjrfoaFHZo46qOL0F2tQneRXIvjHiJzK0c_elvKzCfvHFEKYx_OzZ_jIc9v2EN_BA/exec";

  document.getElementById('fecha').valueAsDate = new Date();

  document.getElementById('form').addEventListener('submit', function (e) {
    e.preventDefault();
    const btn = document.getElementById('btnGuardar');
    const msg = document.getElementById('mensaje');

    btn.disabled = true;
    msg.className = 'cargando';
    msg.textContent = 'Guardando...';

    const datos = {
      descripcion: document.getElementById('descripcion').value,
      fecha: document.getElementById('fecha').value,
      motivo: document.getElementById('motivo').value,
      kms: document.getElementById('kms').value,
      valorCombustible: document.getElementById('valorCombustible').value
    };

    fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(datos)
    })
      .then(res => res.json())
      .then(res => {
        btn.disabled = false;
        if (res.status === 'ok') {
          msg.className = 'ok';
          msg.textContent = '✓ Viaje guardado correctamente';
          document.getElementById('form').reset();
          document.getElementById('fecha').valueAsDate = new Date();
        } else {
          msg.className = 'error';
          msg.textContent = 'Error: ' + res.message;
        }
      })
      .catch(err => {
        btn.disabled = false;
        msg.className = 'error';
        msg.textContent = 'Error de conexión: revisa la URL del script';
      });
  });
</script>

</body>
</html>
